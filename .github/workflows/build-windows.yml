name: Build Windows exe

# Builds the portable Murmuration.exe on a real Windows runner (electron-builder
# needs a Windows host to produce a Windows target). Every run uploads the exe as
# a downloadable artifact; pushing a version tag (v*) also publishes it to a Release.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # needed to create Releases on tag

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build portable exe
        run: npm run dist:win

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Murmuration-windows
          path: dist/*.exe

      - name: Publish to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
